name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  NODE_VERSION: 24

jobs:
  verify:
    name: Verify Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Prefer HTTPS for GitHub git dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Validate release tag
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')); console.log(config.version)")"
          expected_tag="v${package_version}"

          if [ "${package_version}" != "${tauri_version}" ]; then
            echo "package.json version ${package_version} does not match src-tauri/tauri.conf.json version ${tauri_version}."
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

          git fetch origin master:refs/remotes/origin/master
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if ! git merge-base --is-ancestor "${tag_commit}" origin/master; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit reachable from origin/master."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Audit production dependencies
        run: pnpm audit --prod

  package:
    name: Package (${{ matrix.name }})
    needs: verify
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            args: ""
          - name: Windows
            os: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Prefer HTTPS for GitHub git dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri release artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: Lysbilde ${{ github.ref_name }}
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: true
          releaseAssetNamePattern: Lysbilde_[version]_[platform]_[arch][setup][ext]
          args: ${{ matrix.args }}
