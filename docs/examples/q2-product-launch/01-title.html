<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Q2 Product Launch</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue",
          Arial, sans-serif;
        background: #0f0f1e;
        color: white;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 65% 25%, rgba(108, 99, 255, 0.24), transparent 34%),
          linear-gradient(145deg, #0f0f1e 0%, #141430 55%, #0a1028 100%);
      }

      main {
        width: min(920px, calc(100vw - 96px));
        text-align: center;
      }

      .dot {
        width: 8px;
        height: 8px;
        margin: 0 auto 24px;
        border-radius: 999px;
        background: oklch(0.65 0.19 265);
        box-shadow: 0 0 36px oklch(0.65 0.19 265 / 0.4);
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 8vw, 92px);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      p {
        margin: 22px 0 0;
        color: rgba(255, 255, 255, 0.48);
        font-size: clamp(18px, 2vw, 26px);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="dot"></div>
      <h1>Q2 Product Launch</h1>
      <p>Quarterly launch narrative · June 2026</p>
    </main>
  </body>
</html>
