<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agenda</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue",
          Arial, sans-serif;
        background: #0d0d14;
        color: white;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0d0d14;
      }

      main {
        width: min(960px, calc(100vw - 96px));
      }

      .eyebrow {
        margin: 0 0 18px;
        color: oklch(0.65 0.19 265);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 42px;
        font-size: clamp(38px, 6vw, 72px);
        letter-spacing: -0.035em;
      }

      ol {
        display: grid;
        gap: 18px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      li {
        display: flex;
        align-items: center;
        gap: 20px;
        color: rgba(255, 255, 255, 0.82);
        font-size: clamp(20px, 3vw, 34px);
        font-weight: 650;
      }

      span {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        flex: 0 0 42px;
        border: 1px solid oklch(0.65 0.19 265);
        border-radius: 999px;
        background: oklch(0.65 0.19 265 / 0.14);
        color: oklch(0.65 0.19 265);
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Agenda</p>
      <h1>Today&apos;s plan</h1>
      <ol>
        <li><span>1</span> Market situation</li>
        <li><span>2</span> Product launch</li>
        <li><span>3</span> Technical demo</li>
        <li><span>4</span> Pricing and availability</li>
        <li><span>5</span> Questions and next steps</li>
      </ol>
    </main>
  </body>
</html>
