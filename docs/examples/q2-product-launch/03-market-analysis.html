<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Market Analysis</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue",
          Arial, sans-serif;
        background: #080e18;
        color: white;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 15% 10%, rgba(0, 180, 216, 0.16), transparent 34%),
          #080e18;
      }

      main {
        width: min(1040px, calc(100vw - 96px));
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #00b4d8;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0 0 56px;
        font-size: clamp(36px, 5vw, 68px);
        line-height: 1;
        letter-spacing: -0.035em;
      }

      .chart {
        height: 300px;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 18px;
        align-items: end;
      }

      .bar {
        min-height: 52px;
        border: 1px solid rgba(0, 180, 216, 0.24);
        border-radius: 8px 8px 0 0;
        background:
          linear-gradient(0deg, rgba(0, 180, 216, 0.3), transparent),
          rgba(0, 180, 216, 0.12);
      }

      .bar:nth-child(1) { height: 45%; }
      .bar:nth-child(2) { height: 62%; }
      .bar:nth-child(3) { height: 58%; }
      .bar:nth-child(4) { height: 75%; }
      .bar:nth-child(5) { height: 82%; }
      .bar:nth-child(6) { height: 100%; }

      .labels {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 18px;
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.42);
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Market analysis</p>
      <h1>The market is growing 34% year over year</h1>
      <div class="chart" aria-label="Quarterly market growth chart">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <div class="labels">
        <span>Q1</span>
        <span>Q2</span>
        <span>Q3</span>
        <span>Q4</span>
        <span>Q1</span>
        <span>Q2</span>
      </div>
    </main>
  </body>
</html>
