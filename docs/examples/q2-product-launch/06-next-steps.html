<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo And Next Steps</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue",
          Arial, sans-serif;
        background: #100a1e;
        color: white;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 35%, oklch(0.65 0.19 265 / 0.18), transparent 40%),
          linear-gradient(145deg, #100a1e, #1a0f30);
      }

      main {
        width: min(820px, calc(100vw - 96px));
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: oklch(0.65 0.19 265);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 7vw, 86px);
        line-height: 0.98;
        letter-spacing: -0.045em;
      }

      p {
        margin: 22px 0 40px;
        color: rgba(255, 255, 255, 0.48);
        font-size: clamp(18px, 2.4vw, 26px);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
        padding: 0 34px;
        border-radius: 14px;
        background: oklch(0.65 0.19 265);
        box-shadow: 0 8px 32px oklch(0.65 0.19 265 / 0.28);
        color: white;
        font-size: 17px;
        font-weight: 750;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Demo and next steps</p>
      <h1>Ready to try it?</h1>
      <p>Import this folder into Lysbilde and present it as a deck.</p>
      <a href="01-title.html">Restart deck</a>
    </main>
  </body>
</html>
